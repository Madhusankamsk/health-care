services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: health
      POSTGRES_PASSWORD: health
      POSTGRES_DB: health
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U health -d health"]
      interval: 5s
      timeout: 5s
      retries: 5

  health-back:
    build:
      context: ./health-back
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://health:health@db:5432/health
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-dev-change-me-use-long-random-string}
      CLOUDINARY_CLOUD_NAME: dpnjpska6
      CLOUDINARY_API_KEY: 587241693994949
      CLOUDINARY_API_SECRET: mEZlunU--X7_DLcFmGgoMIYaOco
      EMAIL_ENABLED: true
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: madhusankaugc97@gmail.com
      SMTP_PASS: jzogfymswhoqppaj
      EMAIL_FROM: "Health Scan <noreply@healthscan.com>"
      PORT: "4000"
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

  health-front:
    build:
      context: ./health-front
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      HEALTH_BACKEND_URL: http://health-back:4000
      NODE_ENV: production
      # Required over plain HTTP (no TLS); browsers ignore Secure cookies on http://
      COOKIE_SECURE: "false"
    depends_on:
      - health-back

volumes:
  postgres_data:
